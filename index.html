<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ACCA Portal de Negocios ES</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#ffd400;--blue:#43b8ff;--bg:#050811;--glass:rgba(18,27,44,.45);--glass-hover:rgba(26,38,62,.65);--border:rgba(255,255,255,.08);}
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{background:radial-gradient(circle at 10% 10%,rgba(67,184,255,.12),transparent 40%),radial-gradient(circle at 90% 10%,rgba(255,212,0,.06),transparent 40%),linear-gradient(180deg,#03060f,#070d18,#020306);color:#fff;min-height:100vh;overflow-x:hidden;position:relative;padding-bottom:120px;-webkit-font-smoothing:antialiased;}
header{padding:50px 60px 20px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border);background:rgba(3,6,15,0.4);backdrop-filter:blur(10px);}
.brand-group{display:flex;flex-direction:column;gap:4px;}
.logo{font-size:42px;font-weight:900;color:var(--gold);text-shadow:0 0 30px rgba(255,212,0,.3);letter-spacing:-1.5px;line-height:1;margin-bottom:8px;}
h1{font-weight:800;font-size:28px;letter-spacing:-0.5px;color:#fff;}
.subtitle{opacity:.8;font-weight:500;color:#b4c7e7;font-size:14px;text-transform:uppercase;letter-spacing:1px;}
.ops-panel{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:16px;padding:16px 24px;display:flex;align-items:center;gap:24px;max-width:650px;backdrop-filter:blur(8px);}
.ops-info{display:flex;flex-direction:column;gap:4px;}
.ops-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--blue);}
.ops-desc{font-size:13px;color:#8da2bf;line-height:1.4;}
.ops-link{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(67,184,255,0.15),rgba(67,184,255,0.05));border:1px solid rgba(67,184,255,0.3);padding:10px 18px;border-radius:20px;color:#43b8ff;text-decoration:none;font-weight:600;font-size:13px;transition:all 0.25s ease;}
.search-container{padding:30px 60px 10px;display:flex;justify-content:flex-end;}
.search{padding:14px 24px;border-radius:40px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:#fff;width:320px;font-size:14px;transition:all 0.3s ease;backdrop-filter:blur(10px);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:32px;padding:10px 60px 70px;}
.card-wrapper{position:relative;height:360px;}
.card{display:block;position:relative;height:100%;border-radius:24px;overflow:hidden;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);transition:all .4s cubic-bezier(0.16,1,0.3,1);text-decoration:none;color:white;}
.sky{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.35) contrast(1.05);transition:transform 0.8s;}
.flag{position:absolute;top:24px;right:24px;width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.15);}
.content{position:absolute;bottom:24px;left:24px;right:24px;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 20px;border-radius:12px;background:rgba(255,255,255,0.06);color:#fff;font-weight:600;font-size:13px;width:100%;}
.add-country-btn{position:fixed;bottom:35px;right:45px;z-index:100;padding:14px 26px;border-radius:30px;background:rgba(10,17,32,0.75);border:1px solid var(--border);color:#fff;font-weight:600;cursor:pointer;}
.delete-card-btn{position:absolute;top:20px;left:20px;z-index:10;width:32px;height:32px;border-radius:50%;background:rgba(255,77,77,0.1);color:#ff9999;border:none;cursor:pointer;}
</style>
</head>
<body>

<header>
<div class="brand-group">
<div class="logo">ACCA</div>
<h1>Portal de Canvas de Modelo de Negocio</h1>
<div class="subtitle">Workspace de Inteligencia Comercial ES</div>
</div>
<div class="ops-panel">
<div class="ops-info">
<span class="ops-title">ES-Team - Portal de Negocios</span>
<span class="ops-desc">Selecciona un país para abrir su <strong>Business Model Canvas</strong>.</span>
</div>
<a href="https://acca-chat.usbim.com/group/coordinamento-internazionale-8ssz3cpd58m6bj6c2" target="_blank" class="ops-link">Soporte | Tony De Palma</a>
</div>
</header>

<div class="search-container">
<input class="search" id="search" placeholder="Buscar país...">
</div>

<div class="grid" id="grid"></div>

<button class="add-country-btn" id="addCountryBtn">Añadir Workspace</button>

<script>
const STATIC_FALLBACKS = [
  {name:"España", city:"Madrid", code:"es", img:"https://images.unsplash.com/photo-1543783207-ec64e4d95325?w=1200", url:"https://collaborative-bmc.vercel.app/canvas/nfb5e8rhmzpv0b704d514oxnohw8dwz8", custom:false},
  {name:"Argentina", city:"Buenos Aires", code:"ar", img:"https://images.unsplash.com/photo-1518638150340-f706e86654de?w=1200", url:"#", custom:false},
  {name:"México", city:"CDMX", code:"mx", img:"https://images.unsplash.com/photo-1512813583145-baaa340ef29f?w=1200", url:"#", custom:false}
];

let data = [];
const grid = document.getElementById('grid');
const search = document.getElementById('search');
const addBtn = document.getElementById('addCountryBtn');

async function fetchWorkspaces() {
  try {
    const response = await fetch('/api/workspaces');
    data = response.ok ? await response.json() : STATIC_FALLBACKS;
    render(search.value);
  } catch (err) {
    data = STATIC_FALLBACKS;
    render(search.value);
  }
}

function render(filter = ""){
  grid.innerHTML = data
    .filter(d => d.name.toLowerCase().includes(filter.toLowerCase()))
    .map((d, index) => `
    <div class="card-wrapper">
      ${d.custom ? `<button class="delete-card-btn" onclick="deleteCountry(${index}, '${d.name}')">&times;</button>` : ''}
      <a class="card" href="${d.url}" target="_blank">
        <div class="sky" style="background-image:url('${d.img}')"></div>
        <img class="flag" src="https://flagcdn.com/w320/${d.code.toLowerCase()}.png">
        <div class="content">
          <h2>${d.name}</h2>
          <div class="city" style="color:#8da2bf; margin-bottom:15px;">${d.city}</div>
          <div class="btn">Abrir Workspace &rarr;</div>
        </div>
      </a>
    </div>`).join("");
}

window.deleteCountry = async (index, name) => {
  if(confirm(`¿Eliminar workspace de ${name}?`)) {
    await fetch(`/api/workspaces?index=${index}`, { method: 'DELETE' });
    location.reload();
  }
};

addBtn.onclick = async () => {
  const name = prompt("Nombre del País:");
  if(!name) return;
  const newWorkspace = { name, city: prompt("Ciudad:"), code: prompt("Código (es, ar, mx):"), img: prompt("URL de Imagen:"), url: prompt("URL de Canvas:"), custom: true };
  await fetch('/api/workspaces', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(newWorkspace) });
  location.reload();
};

fetchWorkspaces();
search.oninput = e => render(e.target.value);
</script>
</body>
</html>
